name: Build Python APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Build with Buildozer
      uses: ArtemSBulgakov/buildozer-action@v1
      id: buildozer
      with:
        command: buildozer android debug
        buildozer_version: stable
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: mxw01-printer-python-apk
        path: ${{ steps.buildozer.outputs.filename }}
        retention-days: 90
    
    - name: Get version
      id: version
      run: echo "VERSION=v1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT
    
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: ncipollo/release-action@v1
      with:
        tag: ${{ steps.version.outputs.VERSION }}
        name: Python Release ${{ steps.version.outputs.VERSION }}
        body: |
          ## MXW01 Printer - Python/Kivy Version
          
          ### Features
          - ✅ Python Bleak library (PROVEN to work)
          - ✅ Same code as desktop printer_app.py
          - ✅ Kivy UI for Android
          - ✅ Bluetooth thermal printing
          
          ### Installation
          1. Download APK below
          2. Enable "Install from Unknown Sources"
          3. Install APK
          4. Grant Bluetooth and Location permissions
          
          ### Why Python?
          - Desktop Python app WORKS perfectly
          - Bleak library handles Bluetooth correctly
          - No Kotlin/Java Bluetooth issues
          
          ### Supported Printers
          - MXW01 (48:0F:57:3E:60:77)
          
          ### Technical
          - Python 3.11
          - Kivy framework
          - Bleak Bluetooth library
          - Buildozer APK builder
        artifacts: ${{ steps.buildozer.outputs.filename }}
        draft: false
        prerelease: false
        token: ${{ secrets.GITHUB_TOKEN }}
