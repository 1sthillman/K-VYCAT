name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Kotlin APK Build (ÇALIŞAN)
  build-kotlin:
    name: Build Kotlin APK
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout MXWPrinter
      run: |
        git clone https://github.com/1sthillman/K-VYCAT.git temp
        if [ -d "temp/MXWPrinter" ]; then
          mv temp/MXWPrinter ./
        else
          echo "MXWPrinter klasörü bulunamadı, K-VYCAT içeriğini kullan"
          mv temp/* ./
        fi
        rm -rf temp
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Grant execute permission
      run: |
        if [ -f "gradlew" ]; then
          chmod +x gradlew
        elif [ -f "MXWPrinter/gradlew" ]; then
          cd MXWPrinter
          chmod +x gradlew
        fi
    
    - name: Build Debug APK
      run: |
        if [ -f "gradlew" ]; then
          ./gradlew assembleDebug
        elif [ -f "MXWPrinter/gradlew" ]; then
          cd MXWPrinter
          ./gradlew assembleDebug
        fi
    
    - name: Find APK
      id: find_apk
      run: |
        APK=$(find . -name "*.apk" -type f | head -n 1)
        echo "apk_path=$APK" >> $GITHUB_OUTPUT
        echo "Found APK: $APK"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: mxw01-printer-kotlin-apk
        path: ${{ steps.find_apk.outputs.apk_path }}
        retention-days: 90
    
    - name: Get version
      id: version
      run: echo "VERSION=v1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT
    
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: ncipollo/release-action@v1
      with:
        tag: ${{ steps.version.outputs.VERSION }}
        name: Release ${{ steps.version.outputs.VERSION }}
        body: |
          ## MXW01 Printer App
          
          ### Kotlin Version (Recommended)
          - ✅ Native Android app
          - ✅ Material Design 3 UI
          - ✅ Cat-Printer inspired Bluetooth implementation
          - ✅ Tested and working
          
          ### Installation
          1. Download `app-debug.apk`
          2. Enable "Install from Unknown Sources"
          3. Install APK
          4. Grant Bluetooth and Location permissions
          
          ### Features
          - Text and image printing
          - Multiple paper sizes (58mm, 80mm)
          - Banner mode
          - Auto-reconnect
          - Print queue
          
          ### Supported Printers
          - MXW01 (48:0F:57:3E:60:77)
          
          ### Technical
          - Kotlin + Jetpack Compose
          - Bluetooth Low Energy (BLE)
          - Cat-Printer protocol implementation
        artifacts: ${{ steps.find_apk.outputs.apk_path }}
        draft: false
        prerelease: false
        token: ${{ secrets.GITHUB_TOKEN }}
