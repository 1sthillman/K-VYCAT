name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build with Buildozer
      uses: ArtemSBulgakov/buildozer-action@v1
      id: buildozer
      with:
        workdir: .
        buildozer_version: stable
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: mxw01-printer-apk
        path: .buildozer/android/platform/build-arm64-v8a_armeabi-v7a/dists/mxw01printer/build/outputs/apk/debug/*.apk
